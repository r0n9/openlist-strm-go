name: Release and Publish

# 触发条件：当推送以 'v' 开头的 tag 时（例如 v1.0.0, v2.1.3）
on:
  push:
    tags:
      - 'v*'

# 配置权限，允许 Action 创建 Release
permissions:
  contents: write

jobs:
  # ==========================================
  # 任务 1：交叉编译二进制文件并发布到 GitHub Release
  # ==========================================
  release-binaries:
    name: Build & Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 定义需要编译的目标平台和架构
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: windows
            arch: amd64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0' # 与你的 go.mod 保持一致

      - name: Build Binary
        run: |
          mkdir -p dist
          BINARY_NAME=openlist-strm-go_${{ matrix.os }}_${{ matrix.arch }}
          # 如果是 Windows，自动加上 .exe 后缀
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          # 执行编译 (禁用 CGO 以保证跨平台兼容性)
          CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -trimpath -ldflags="-s -w" -o dist/$BINARY_NAME ./main.go

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true # 自动根据 commit 生成更新日志

  # ==========================================
  # 任务 2：构建多架构 Docker 镜像并推送到 Docker Hub
  # ==========================================
  docker-push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: release-binaries # 等二进制发布成功后再推送镜像
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU (For Multi-Arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # 替换为你在 Docker Hub 上的仓库名，这里默认取你的用户名
          images: ${{ secrets.DOCKERHUB_USERNAME }}/openlist-strm-go
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 自动构建 amd64 和 arm64 架构，适配普通 NAS 和 树莓派/Mac M系列等
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}